name: Run Evals

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    name: Braintrust Eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run evals
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
        run: uv run braintrust eval eval_agent.py
