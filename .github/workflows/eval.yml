name: Run Evals

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  eval:
    name: Braintrust Eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run evals
        id: eval
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
        run: uv run braintrust eval eval_agent.py 2>&1 | tee eval_output.txt

      - name: Comment PR with eval results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('eval_output.txt', 'utf8');
            const summaryMatch = output.match(/={10,}SUMMARY={10,}[\s\S]+/);
            const summary = summaryMatch ? summaryMatch[0] : 'Eval completed — see Actions log for details.';
            const experimentMatch = output.match(/https:\/\/www\.braintrust\.dev\/app\/\S+\/experiments\/\S+/);
            const experimentUrl = experimentMatch ? experimentMatch[0] : null;
            const body = [
              '## Braintrust Eval Results',
              experimentUrl ? `**[View full experiment →](${experimentUrl})**` : '',
              '```',
              summary,
              '```',
            ].filter(Boolean).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
